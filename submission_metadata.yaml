ai_usage_summary: |
  Used Gemini (via Antigravity) for codebase exploration, honeypot detection, ranking logic design, and implementation review.

methodology_summary: |
  Two-stage retrieval and re-ranking architecture. First-stage BM25 keyword matching filters 100k candidates to the top 2000. Second-stage re-ranking uses local SentenceTransformer semantic similarity combined with heuristics for experience (target 5-9 years), company pedigree, notice period, location, and platform activity. Logical contradictions are filtered out as honeypots.

